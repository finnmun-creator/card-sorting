<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="35%" stop-color="#F7567C"/>
      <stop offset="65%" stop-color="#FF8E53"/>
      <stop offset="100%" stop-color="#FFC857"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="1024" height="1024" rx="220" fill="white" opacity="0.06"/>

  <!-- Tier bars - white, different widths suggesting ranking -->
  <!-- S tier - longest -->
  <rect x="260" y="280" width="504" height="88" rx="18" fill="white" opacity="0.95"/>

  <!-- A tier - medium -->
  <rect x="260" y="400" width="390" height="88" rx="18" fill="white" opacity="0.75"/>

  <!-- B tier - shorter -->
  <rect x="260" y="520" width="290" height="88" rx="18" fill="white" opacity="0.55"/>

  <!-- C tier - shortest -->
  <rect x="260" y="640" width="200" height="88" rx="18" fill="white" opacity="0.38"/>
</svg>
